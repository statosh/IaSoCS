<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title></title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header class="header">
            Шапка
        </header>
        <div class="content">
            <h1 class="greetings">Привет, <span class="greet-name"></span></h1>
            <div class="сont-blocks">
                <div class="file-block">
                    Файлов: <span class="file-count"></span>
                </div>
                <div class="chats-block">
                    Чатов: <span class="chat-count"></span>
                </div>
            </div>
            <h2 class="quick-access-text">Быстрый доступ к файлам</h2>
            <div class="ext-blocks">
                <div class="doc-block">doc</div>
                <div class="pdf-block">pdf</div>
                <div class="jpg-block">jpg</div>
                <div class="xls-block">xls</div>
            </div>
            <h2 class="last-message-text">Последние сообщения</h2>
            <ul class="chat-block">
                <!-- Тут будут последние 5 сообщений из чата -->
            </ul>
            <h2 class="usage-stats-text">Статистика использования</h2>
            <div class="disk-usage">
                <!-- Тут будет шкала заполнения диска в процентах -->
            </div>
        </div>
    </body>
</html>
